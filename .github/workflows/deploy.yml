name: Deploy to Hetzner

on:
  push:
    branches:
      - production

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend build check ────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & build backend
        run: dotnet build LifeHub-Backend/LifeHub.csproj --configuration Release

      # ── Frontend build check ───────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: LifeHub-Frontend/package-lock.json

      - name: Install & build frontend
        working-directory: LifeHub-Frontend
        run: |
          npm ci
          npm run build

      # ── Deploy via SSH ─────────────────────────────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/lifehub
            git pull origin production
            docker compose up -d --build
            docker compose ps
