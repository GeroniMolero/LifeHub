name: Build & Deploy
 
on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Build & deploy ALL (ignore change detection)'
        type: boolean
        default: false
 
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build_backend: ${{ steps.filter.outputs.backend }}
      build_frontend: ${{ steps.filter.outputs.frontend }}
      force_all: ${{ github.event.inputs.force_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'LifeHub-Backend/**'
            frontend:
              - 'LifeHub-Frontend/**'
 
  build-backend:
    needs: changes
    if: |
      needs.changes.outputs.force_all == 'true' ||
      needs.changes.outputs.build_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore & build backend
        run: dotnet build LifeHub-Backend/LifeHub.csproj --configuration Release
 
  build-frontend:
    needs: changes
    if: |
      needs.changes.outputs.force_all == 'true' ||
      needs.changes.outputs.build_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: LifeHub-Frontend/package-lock.json
      - name: Install & build frontend
        working-directory: LifeHub-Frontend
        run: |
          npm ci
          npm run build
 
  deploy:
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/lifehub
            git checkout production
            git pull origin production
            docker compose up -d --build
            docker compose ps
