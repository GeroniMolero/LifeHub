name: Build & Deploy
 
on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Build & deploy ALL (ignore change detection)'
        type: boolean
        default: false
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: geronimolero/lifehub
 
permissions:
  contents: read
  packages: write
 
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build_backend: ${{ steps.filter.outputs.backend }}
      build_frontend: ${{ steps.filter.outputs.frontend }}
      force_all: ${{ github.event.inputs.force_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'LifeHub-Backend/**'
            frontend:
              - 'LifeHub-Frontend/**'
 
  build-backend:
    needs: changes
    if: |
      needs.changes.outputs.force_all == 'true' ||
      needs.changes.outputs.build_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./LifeHub-Backend
          file: ./LifeHub-Backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          platforms: linux/amd64
 
  build-frontend:
    needs: changes
    if: |
      needs.changes.outputs.force_all == 'true' ||
      needs.changes.outputs.build_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./LifeHub-Frontend
          file: ./LifeHub-Frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          platforms: linux/amd64
 
  deploy:
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,DB_PASSWORD,JWT_KEY,ADMIN_PASSWORD,ADMIN_EMAIL,GHCR_PAT,DISCORD_WEBHOOK_URL
          script: |
            REPO_URL="https://${{ secrets.GHCR_PAT }}@github.com/${{ github.repository }}.git"
 
            if [ ! -d "/opt/lifehub/.git" ]; then
              rm -rf /opt/lifehub
              git clone "$REPO_URL" /opt/lifehub
            fi
 
            cd /opt/lifehub
            git fetch "$REPO_URL" production
            git checkout production
            git reset --hard FETCH_HEAD
            git clean -fd
 
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
 
            > .env
            printf 'DB_PASSWORD=%s\n'            "$DB_PASSWORD"                        >> .env
            printf 'DB_NAME=%s\n'                "${{ vars.DB_NAME }}"                 >> .env
            printf 'DB_USER=%s\n'                "${{ vars.DB_USER }}"                 >> .env
            printf 'DB_HOST=%s\n'                "${{ vars.DB_HOST }}"                 >> .env
            printf 'MSSQL_PID=%s\n'              "${{ vars.MSSQL_PID }}"               >> .env
            printf 'SQL_CONTAINER=%s\n'          "${{ vars.SQL_CONTAINER }}"           >> .env
            printf 'BACKEND_CONTAINER=%s\n'      "${{ vars.BACKEND_CONTAINER }}"       >> .env
            printf 'FRONTEND_CONTAINER=%s\n'     "${{ vars.FRONTEND_CONTAINER }}"      >> .env
            printf 'BACKEND_PORT=%s\n'           "${{ vars.BACKEND_PORT }}"            >> .env
            printf 'PUBLIC_PORT=%s\n'            "${{ vars.PUBLIC_PORT }}"             >> .env
            printf 'ASPNETCORE_ENVIRONMENT=%s\n' "${{ vars.ASPNETCORE_ENVIRONMENT }}"  >> .env
            printf 'SQLCMD_PATH=%s\n'            "${{ vars.SQLCMD_PATH }}"             >> .env
            printf 'SQLCMD_OPTS=%s\n'            "${{ vars.SQLCMD_OPTS }}"             >> .env
            printf 'JWT_KEY=%s\n'                "$JWT_KEY"                            >> .env
            printf 'ADMIN_EMAIL=%s\n'            "$ADMIN_EMAIL"                        >> .env
            printf 'ADMIN_PASSWORD=%s\n'         "$ADMIN_PASSWORD"                     >> .env
            printf 'DOMAIN=%s\n'                 "${{ vars.DOMAIN }}"                  >> .env
            printf 'DISCORD_WEBHOOK_URL=%s\n'   "$DISCORD_WEBHOOK_URL"                >> .env
 
            chmod 600 .env

            docker compose up -d --build --force-recreate
            docker compose ps