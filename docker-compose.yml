name: lifehub-prod

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lifehub-sqlserver
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Express
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -No || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - lifehub-network

  backend:
    build:
      context: ./LifeHub-Backend
      dockerfile: Dockerfile
    container_name: lifehub-backend
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=LifeHubDB;User=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - Jwt__Key=${JWT_KEY}
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - lifehub-network

  frontend:
    build:
      context: ./LifeHub-Frontend
      dockerfile: Dockerfile
    container_name: lifehub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lifehub-network

volumes:
  sqlserver_data:

networks:
  lifehub-network:
    driver: bridge
