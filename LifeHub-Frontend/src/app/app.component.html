<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <h1 class="app-title">LifeHub</h1>
      
      <nav class="nav-menu" *ngIf="currentUser">
        <div class="user-info">
          <span class="user-name">{{ currentUser.fullName || currentUser.email }}</span>
          <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
            ☰
          </button>
        </div>
        <div class="menu-items" *ngIf="isMenuOpen">
          <button class="logout-btn" (click)="logout()">Cerrar sesión</button>
        </div>
      </nav>
    </div>
  </header>

  <div class="app-body">
    <app-sidebar *ngIf="isAuthenticated"></app-sidebar>
    
    <main class="app-main">
      <div class="app-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <footer class="app-footer">
    <p>&copy; 2026 LifeHub. Todos los derechos reservados.</p>
  </footer>
</div>
