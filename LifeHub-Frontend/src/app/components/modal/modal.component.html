<div class="modal-backdrop" *ngIf="visible" (click)="onBackdropClick($event)">
  <div class="modal-panel" role="dialog" [attr.aria-label]="title">
    <div class="modal-header">
      <h2>{{ title }}</h2>
      <div class="modal-header-actions">
        <ng-content select="[modal-header-actions]" />
      </div>
      <button type="button" class="modal-close" (click)="close()" aria-label="Cerrar">×</button>
    </div>
    <div class="modal-body">
      <ng-content />
    </div>
  </div>
</div>
