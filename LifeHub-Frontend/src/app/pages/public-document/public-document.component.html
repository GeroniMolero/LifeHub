<section class="public-doc" *ngIf="!loading; else loadingTpl">
  <a routerLink="/login" class="brand-link" aria-label="Ir a LifeHub">
    <img src="/assets/images/logo-nombre.png" alt="LifeHub" class="brand-logo" />
  </a>

  <div *ngIf="error" class="error">{{ error }}</div>

  <article *ngIf="document" class="doc-card">
    <header class="doc-header">
      <h1>{{ document.title }}</h1>
      <p class="description" *ngIf="document.description">{{ document.description }}</p>
      <p class="doc-author" *ngIf="document.author">Por {{ document.author }}</p>
      <small class="pub-date" *ngIf="document.publishedAt">Publicado {{ document.publishedAt | date:'mediumDate' }}</small>
    </header>

    <div class="rendered-markdown" [innerHTML]="renderedContent"></div>
    <p class="doc-empty" *ngIf="!renderedContent">(sin contenido)</p>

    <section class="media-section" *ngIf="document.mediaReferences.length > 0">
      <h2>Recursos multimedia</h2>
      <div *ngFor="let item of document.mediaReferences" class="media-item">
        <h3>{{ item.label }}</h3>
        <p class="media-meta">{{ item.type }}<span *ngIf="item.provider"> · {{ item.provider }}</span></p>
        <div class="embed-wrapper" *ngIf="item.embedUrl">
          <iframe [src]="toTrustedResource(item.embedUrl)" loading="lazy" title="Recurso embebido"></iframe>
        </div>
      </div>
    </section>

  </article>
</section>

<ng-template #loadingTpl>
  <p class="loading-state">Cargando documento público...</p>
</ng-template>
