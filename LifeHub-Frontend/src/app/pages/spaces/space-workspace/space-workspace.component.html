<section class="workspace" *ngIf="!loading; else loadingTpl">

  <app-space-settings-panel
    [showEditSpace]="showEditSpace"
    [editSpaceForm]="editSpaceForm"
    [loading]="loading"
    (save)="saveSpace()"
    (cancel)="toggleEditSpace()">
  </app-space-settings-panel>

  <div *ngIf="error" class="error-bar">{{ error }}</div>

  <!-- ── Main workspace body ────────────────────────────── -->
  <div class="workspace-body" *ngIf="space">

    <app-space-editor-main
      [selectedDocument]="selectedDocument"
      [editDocumentForm]="editDocumentForm"
      [activeTab]="activeTab"
      [renderedPreview]="renderedPreview"
      [loadingDocuments]="loadingDocuments"
      [activeVisualMediaReferences]="activeVisualMediaReferences"
      [localFileBlobUrls]="localFileBlobUrls"
      [visualLayouts]="visualLayouts"
      (setActiveTab)="setActiveTab($event)"
      (saveDocument)="saveDocument()"
      (deleteDocument)="deleteDocument($event)"
      (startDraggingMedia)="startDraggingMedia($event.event, $event.id)">
    </app-space-editor-main>

    <!-- ===== Right: Sidebar ===== -->
    <aside class="workspace-sidebar">

      <app-space-documents-sidebar
        [showCreateDocument]="showCreateDocument"
        [createDocumentForm]="createDocumentForm"
        [loadingDocuments]="loadingDocuments"
        [documents]="documents"
        [selectedDocument]="selectedDocument"
        (toggleCreateDocument)="toggleCreateDocument()"
        (createDocument)="createDocument()"
        (selectDocument)="selectDocument($event)">
      </app-space-documents-sidebar>

      <app-space-media-sidebar
        [showCreateMedia]="showCreateMedia"
        [mediaTab]="mediaTab"
        [createEmbedForm]="createEmbedForm"
        [localFileLabelControl]="localFileLabelControl"
        [selectedLocalFile]="selectedLocalFile"
        [allowedEmbedDomains]="allowedEmbedDomains"
        [mediaError]="mediaError"
        [loadingMedia]="loadingMedia"
        [mediaReferences]="mediaReferences"
        [audioMediaReferences]="audioMediaReferences"
        [activeVisualMediaIds]="activeVisualMediaIds"
        [localFileBlobUrls]="localFileBlobUrls"
        (toggleCreateMedia)="toggleCreateMedia()"
        (setMediaTab)="mediaTab = $event"
        (addEmbedReference)="addEmbedReference()"
        (onLocalFileSelected)="onLocalFileSelected($event)"
        (addLocalFileReference)="addLocalFileReference()"
        (onMediaReferenceClick)="onMediaReferenceClick($event)"
        (removeMediaReference)="removeMediaReference($event)">
      </app-space-media-sidebar>

    </aside>

  </div>
</section>

<ng-template #loadingTpl>
  <div class="workspace-loading">Cargando espacio...</div>
</ng-template>
