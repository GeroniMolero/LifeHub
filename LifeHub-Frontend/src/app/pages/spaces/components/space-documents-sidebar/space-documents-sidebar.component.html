<div class="sidebar-section">
  <div class="sidebar-section-header">
    <span class="sidebar-section-title">Documentos</span>
    <button type="button" class="btn-icon" (click)="openCreateDocument.emit()" title="Nuevo documento">+</button>
  </div>

  <div *ngIf="loadingDocuments" class="sidebar-muted">Cargando...</div>
  <div *ngIf="!loadingDocuments && documents.length === 0" class="sidebar-empty">
    Sin documentos. Usa <strong>+</strong> para crear.
  </div>

  <input *ngIf="documents.length > 0"
         class="doc-search"
         type="search"
         placeholder="Buscar documento..."
         [(ngModel)]="searchQuery"
         aria-label="Buscar documento" />

  <div *ngIf="!loadingDocuments && documents.length > 0 && filteredDocuments.length === 0"
       class="sidebar-empty">
    Sin resultados para "<strong>{{ searchQuery }}</strong>".
  </div>

  <ul class="sidebar-doc-list" *ngIf="filteredDocuments.length > 0">
    <li *ngFor="let doc of filteredDocuments" [class.active]="selectedDocument?.id === doc.id" (click)="onDocumentClick(doc)">
      <div class="sidebar-doc-info">
        <span class="sidebar-doc-name">{{ doc.title }}</span>
        <span class="sidebar-doc-meta">{{ getTypeText(doc.type) }}</span>
      </div>
      <a [routerLink]="['/documents', doc.id]" class="doc-detail-link" (click)="$event.stopPropagation()" title="Ver detalle completo">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5C6.5 5 2 12 2 12s4.5 7 10 7 10-7 10-7-4.5-7-10-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-2.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
        </svg>
      </a>
    </li>
  </ul>
</div>
