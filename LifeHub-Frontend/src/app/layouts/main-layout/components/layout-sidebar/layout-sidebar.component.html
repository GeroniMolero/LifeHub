<aside class="layout-sidebar" [class.layout-sidebar-open]="isOpen">
  <div class="sidebar-brand">
    <button class="brand-link" type="button" routerLink="/spaces" (click)="close()">
      <img class="brand-logo" src="assets/images/logo.png" alt="Logo LifeHub" />
      <span>
        <strong>LifeHub</strong>
        <small>Workspace creativo</small>
      </span>
    </button>
    <button class="sidebar-close" type="button" (click)="close()" aria-label="Cerrar menu">
      x
    </button>
  </div>

  <nav class="sidebar-nav" aria-label="Navegacion principal">
    <a
      *ngFor="let item of visibleNavigationItems"
      class="nav-link"
      [routerLink]="item.route"
      routerLinkActive="nav-link-active"
      [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
      (click)="close()"
    >
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path [attr.d]="item.iconPath"></path>
        </svg>
      </span>
      <span class="nav-label">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.route === '/social' && chatUnreadCount > 0">
        {{ chatUnreadCount > 99 ? '99+' : chatUnreadCount }}
      </span>
    </a>
  </nav>

  <div class="sidebar-footer" *ngIf="currentUser">
    <a class="sidebar-profile-card" routerLink="/profile" routerLinkActive="sidebar-profile-card-active" [routerLinkActiveOptions]="{ exact: false }" (click)="close()">
      <ng-container *ngIf="currentUser.profilePictureUrl; else initialsAvatar">
        <img
          class="sidebar-profile-avatar"
          [src]="currentUser.profilePictureUrl"
          [alt]="currentUser.fullName ? currentUser.fullName + ' avatar' : 'Avatar de usuario'"
        />
      </ng-container>
      <ng-template #initialsAvatar>
        <span class="sidebar-profile-avatar">{{ (currentUser.fullName || currentUser.email || 'U').charAt(0) | uppercase }}</span>
      </ng-template>
      <span class="sidebar-profile-copy">
        <strong>{{ currentUser.fullName || 'Usuario' }}</strong>
        <small>{{ currentUser.email }}</small>
      </span>
    </a>

    <div class="sidebar-footer-actions">
      <button type="button" class="sidebar-footer-link sidebar-logout-btn" (click)="onLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Cerrar sesión</span>
      </button>
    </div>

    <div class="sidebar-copyright">
      <span>© 2026 LifeHub</span>
      <span>Gerónimo Molero Rodríguez</span>
      <a href="mailto:gemordz&#64;gmail.com">gemordz&#64;gmail.com</a>
    </div>
  </div>
</aside>
