<div class="layout-shell">
  <app-layout-sidebar [isOpen]="isSidebarOpen" [currentUser]="currentUser" (closeSidebar)="closeSidebar()" (logout)="logout()"></app-layout-sidebar>

  <div class="layout-overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <div class="layout-main-column">
    <app-layout-header
      [headerTitle]="headerTitle"
      [headerDescription]="headerDescription"
      [headerMeta]="headerMeta"
      [headerActions]="headerActions"
      (toggleSidebar)="toggleSidebar()"
      (logout)="logout()">
    </app-layout-header>

    <main class="layout-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
